{% extends 'base.html' %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{{ url_for('main.people_list') }}">People</a></li>
    <li class="breadcrumb-item active">Edit {{ person.name }}</li>
  </ol>
</nav>

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header fw-semibold">
        <i class="bi bi-pencil me-2"></i>Edit Person
      </div>
      <div class="card-body">
        <form action="{{ url_for('main.edit_person', id=person.id) }}" method="POST">

          <div class="mb-3">
            <label class="form-label">Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="name" value="{{ person.name }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Relation <span class="text-danger">*</span></label>
            <select class="form-select" name="relation_id" required>
              {% for relation in relations %}
              <option value="{{ relation.id }}" {% if person.relation_id == relation.id %}selected{% endif %}>
                {{ relation.name }}
              </option>
              {% endfor %}
            </select>
          </div>

          <label class="form-label">Birthday <span class="text-danger">*</span></label>
          <div class="row g-2 mb-1">
            <div class="col-5">
              <select class="form-select" name="month" required>
                {% for m in range(1, 13) %}
                <option value="{{ m }}" {% if person.birthday_month == m %}selected{% endif %}>
                  {{ month_names[m] }}
                </option>
                {% endfor %}
              </select>
            </div>
            <div class="col-3">
              <select class="form-select" name="day" required>
                {% for d in range(1, 32) %}
                <option value="{{ d }}" {% if person.birthday_day == d %}selected{% endif %}>{{ d }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-4">
              <input type="number" class="form-control" name="year" placeholder="Year (opt)"
                     min="1900" max="2100" value="{{ person.birthday_year or '' }}">
            </div>
          </div>
          <div class="form-text mb-4">Year is optional — used to calculate and display age.</div>

          <div class="d-flex justify-content-between">
            <a href="{{ url_for('main.people_list') }}" class="btn btn-secondary">
              <i class="bi bi-arrow-left me-1"></i>Cancel
            </a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>Save Changes
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
